apiVersion: apps/v1
kind: Deployment
metadata:
  name: utils
spec:
  replicas: 2
  selector:
    matchLabels:
      app: utils
  template:
    metadata:
      labels:
        app: utils
    spec:
      nodeSelector:
        "kubernetes.io/os": linux
      containers:
        - name: utils
          image: acrname.azurecr.io/image_namespace/utils:latest # you will need to update this with your ACR login server and image namespace
          ports:
            - containerPort: 5000
          env:
            - name: VERSION
              value: "aks-deploy"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/ping
              port: 5000
            failureThreshold: 3
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/ping
              port: 5000
            failureThreshold: 5
            initialDelaySeconds: 3
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: utils-service
  labels:
    app: utils
spec:
  ports:
    - port: 80
      targetPort: 5000
  selector:
    app: utils
  type: LoadBalancer